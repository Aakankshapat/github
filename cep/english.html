<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarHub - Select category</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: peachpuff;
            flex-direction: column;
            text-align: center;
        }
        .container {
            background-color:papayawhip;
            padding: 150px 180px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
         h5 {
            color: #333;
            margin-bottom: 20px;
            font-size:2.5em;
        }
        .categories {
            margin-top: 30px;
        }
        .school {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }
        .Technical {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }

        .Medical {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }

        .Sports {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }
        


        .school-button:hover {
            background-color: #0056b3;
        }
                .Technical-button:hover {
            background-color: #0056b3;
        }
                .Medical-button:hover {
            background-color: #0056b3;
        }

        .back-button 
        { margin-top: 20px; 
            background-color: #6c757d;
             color: white; 
             padding: 10px 15px; 
             border-radius: 5px; 
             text-decoration: none; 
             display: inline-block; 
            }


    </style>
    </head>
    <body>
        <div class="container">
       <h4>Welcome to english version of ScholarHub ,Please select your category</h4>
            <div class="categories">
                <button class="school" onclick="selectcategory('school')">1 to 12 th</button>
                <button class="Technical" onclick="selectcategory('Technical')">Technical</button>
                <button class="Medical" onclick="selectcategory('Medical')">Medical</button>
                <button class="Sports" onclick="selectcategory('Sports')">Sports</button>
                <p><a href="index.html" class="back-button">Back to Home page</a></p>
            </div> 
        </div>
        <script>
            function selectcategory(category)
            {
                if(category==='school')
            {window.location.href="scheme-1.html"}
            else if(category==='Technical')
            {window.location.href="scheme-2.html"}
            else if(category==='Medical')
            {window.location.href="scheme-3.html"}
            else if(category==='Sports')
            {window.location.href="scheme-4.html"}
            
            }
            </script>
            </body>
            </html>
