<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarHub - Select Language</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(248, 215, 187);
            flex-direction: column;
            text-align: center;
        }
        #navbar {
            background-color:rgb(50, 50, 50);
            width:1350px;
            height: 30px;
            color:white;
            
           padding: 15px 100px;
        
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #logo {
            color:palevioletred;
            font-size: 40px;
            font-style: bold;
            cursor:pointer;
        }
        #ab {
            color:palegoldenrod;
            
            font-style: bold;
            cursor:pointer;
        }
        #he {
            color:palegoldenrod;
           ;
            font-style: bold;
            cursor:pointer;
        }
        #con {
            color:palegoldenrod;
            
            font-style: bold;
            cursor:pointer;
        }
        a {
            margin-right:220px ;
            text-decoration: none;
        }
        .container {
            background-color:papayawhip;
            height:3000px;
            padding: 210px 400px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .language-selection {
            margin-top: 30px;
        }
        .language-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }
        .language-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<header><div id="navbar">
   <a href="#" id="logo">ScholarHub</a>
    <a href="about.html" id="ab"> About ScholarHub </a>
    <a href="help.html" id="he"> help </a>
    <a href="contact.html" id="con"> Contact Us </a>
     
    
</div>
</header><br>

    <div class="container">
        <h1>Welcome to ScholarHub</h1>
        <div class="language-selection">
            <p>Please select your preferred language:</p>
            <button class="language-button" onclick="selectLanguage('marathi')">मराठी (Marathi)</button>
            <button class="language-button" onclick="selectLanguage('english')">English</button>
        </div>
    </div>

    <script>
        function selectLanguage(language) {
            if (language === 'marathi') {
                window.location.href = "marathi.html";
            } else if (language === 'english') {
                window.location.href = "english.html";
            }
        }
    </script>
<footer><div id="navbar">By ScholarHub</div></footer>
</body>
</html>
