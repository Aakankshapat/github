<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarHub - Select scheme</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: peachpuff;
            flex-direction: column;
            text-align: center;
        }
        .container {
            background-color:papayawhip;
            padding: 180px 200px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .scheme {
            margin-top: 30px;
        }

        .scheme {
            background-color:#007bff;
            color:white;
            border: none;
            padding: 10px 100px;
            font-size: 0.8em;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }

        .scheme-button:hover {
            background-color:blue;
        }

        .back-button {
            margin-top: 20px;
            background-color: #6c757d; 
            color: white; 
            padding: 10px 15px; 
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            }
    </style>
    </head>
    <body>
        <h1>Select Your Scheme</h1>
        <div class="container">
            
            <div class="categories">
                <button class="scheme" onclick="selectcategory('Khelo India Scholarship (National Level) ')">Khelo India Scholarship (National Level)</button><br><br>

            </div> 
              <div class="categories">
                <button class="scheme" onclick="selectcategory('Jyoti Prakash Scholarship for Sportspersons')">Jyoti Prakash Scholarship for Sportspersons</button><br><br>

            </div> 
             
            <div class="categories">
                <button class="scheme" onclick="selectcategory('ONGC Sports Scholarship (India, National) ')">ONGC Sports Scholarship (India, National)</button><br><br>

            </div>
            <div class="categories">
                <button class="scheme" onclick="selectcategory('DXC Progressing Minds Scholarship for Sportspersons')">DXC Progressing Minds Scholarship for Sportspersons</button><br><br>

            </div>
             <div class="categories">
                <button class="scheme" onclick="selectcategory('AAI Sports Scholarship Scheme')">AAI Sports Scholarship Scheme</button><br><br>

            </div>
            
         
           </div>
                        <p><a href="english.html" class="back-button">Back to category</a></p>
                <script>
            function selectcategory(category)
            {
                if(category==='Khelo India Scholarship (National Level) ')
            {window.location.href="sports(1).html"}
                else if(category==='Jyoti Prakash Scholarship for Sportspersons')
            {window.location.href="sports(2).html"}
                else if(category==='ONGC Sports Scholarship (India, National)')
            {window.location.href="sports(3).html"}
                else if(category==='DXC Progressing Minds Scholarship for Sportspersons')
            {window.location.href="sports(4).html"}
                else if(category==='AAI Sports Scholarship Scheme')
            {window.location.href="sports(5).html"}
            }
            </script>
            </body>
            </html>
