<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarHub - Select scheme</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: peachpuff;
            flex-direction: column;
            text-align: center;
        }
        .container {
            background-color:papayawhip;
            padding: 180px 200px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .scheme {
            margin-top: 30px;
        }

        .scheme {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 200px;
            font-size: 0.6em;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s ease;
        }

        .scheme-button:hover {
            background-color: #0056b3;
        }

        .back-button {
             margin-top: 20px;
            background-color: #6c757d; 
            color: white; 
            padding: 10px 15px; 
            border-radius: 5px;
             text-decoration: none;
              display: inline-block;
             }
    </style>
    </head>
    <body>
        <h1>select your scheme</h1>
        <div class="container">
            
            <div class="categories">
                <h1></h1>
                <button class="scheme" onclick="selectcategory('EBC')">राष्ट्रीय शिष्यवृत्ती पोर्टल (NSP), भारत सरकार
                </button><br><br>
                <button class="scheme" onclick="selectcategory('PDNB')">अपंग विद्यार्थ्यांसाठी माध्यमोत्तर शिष्यवृत्ती (महाराष्ट्र)</button><br><br>
                <button class="scheme" onclick="selectcategory('asb')">राजर्षी छत्रपती शाहू महाराज गुणवत्ताधारित शिष्यवृत्ती (SC/OBC/VJNT/SBC साठी)  
महाराष्ट्र शासन</button><br><br>
                <button class="scheme" onclick="selectcategory('asc')"> डॉ. पंजाबराव देशमुख देखभाल भत्ता शिष्यवृत्ती
महाराष्ट्र शासन    </button><br><br>
                <button class="scheme" onclick="selectcategory('asd')">महाराष्ट्र माध्यमोत्तर शिष्यवृत्ती  
महाराष्ट्र शासन</button><br><br>

                <p><a href="marathi.html" class="back-button">श्रेणींवर परत जा</a></p>
            </div> 
        </div>
                <script>
            function selectcategory(category)
            {
                if(category==='EBC')
            {window.location.href="medien1.html"}
            else if(category==='PDNB')
            {window.location.href="medien2.html"}
            else if(category==='asb')
            {window.location.href="medien3.html"}
            else if(category==='asc')
            {window.location.href="medien4.html"}
            else if(category==='as')
            {window.location.href="medien5.html"}
            
            }
            </script>
            </body>
            </html>
